# Dependabot version updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# 月次でまとめて PR を立てる方針 (週次だと PR ノイズが多すぎる)。
# security updates (CVE 由来) は別系統で自動的に飛んでくるので、ここは通常版のみ。

version: 2
updates:
  # Go modules (cmd/syllabus-cli, internal/fetch などが import するもの)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - "*"

  # Web deps (Svelte / Vite / Tailwind / Vitest etc.)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
