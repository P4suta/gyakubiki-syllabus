# Dependabot version updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# 月次でまとめて PR を立てる方針 (週次だと PR ノイズが多すぎる)。
# security updates (CVE 由来) は別系統で自動的に飛んでくるので、ここは通常版のみ。

version: 2
updates:
  # Rust crates (crates/core, crates/wasm, crates/cli)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns:
          - "*"

  # Web deps (Svelte / Vite / Tailwind / Vitest etc.)
  # web/ は bun + bun.lockb を使う。Dependabot の bun ecosystem は bun.lockb を
  # ネイティブに更新できる (npm として扱うと frozen-lockfile で CI fail する)。
  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: "monday"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
