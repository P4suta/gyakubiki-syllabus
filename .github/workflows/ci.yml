name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Reads rust-toolchain.toml (channel + components + wasm32 target); also
      # caches ~/.cargo + target automatically.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # fmt needs no build — run it first so a formatting slip fails in seconds.
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      # llvm-cov *runs the tests* under instrumentation, so test + coverage share
      # one build here instead of two jobs each doing a full workspace compile.
      # Native coverage only (the wasm crate's #[wasm_bindgen] surface isn't
      # exercised natively).
      - name: test + coverage
        run: cargo llvm-cov --locked --workspace --exclude syllabus-wasm --no-report
      - name: coverage report + enforce threshold (lines >= 80%)
        run: |
          cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --fail-under-lines 80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
      # FIELD_SPEC drives both the generated TS and docs; fail if they are stale.
      - name: field spec generated files up to date
        run: cargo run --locked -q -p syllabus-cli -- gen-field-docs --check
      # The course/eval colours are derived (OKLCH); fail on a hand-edit that drifts.
      - name: palette matches its derivation
        run: cargo run --locked -q -p syllabus-cli -- gen-palette --check

  typos:
    name: typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@master

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !web/**

  web:
    name: Web (check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      # The frontend imports the generated WASM glue, so build it first.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: build wasm
        working-directory: ${{ github.workspace }}
        # --out-dir is relative to the crate root (crates/wasm), hence ../../.
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus
      - name: wasm boundary tests (node)
        working-directory: ${{ github.workspace }}
        # Exercise the JsValue shapes the frontend depends on (camelCase keys, …).
        run: wasm-pack test --node crates/wasm
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      # Unit tests with the coverage gate on the pure lib/ modules (see vite.config).
      - run: bun run test:cov

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The dev server imports the generated WASM glue; global-setup shells out to
      # the CLI for the sample dataset — both need the Rust toolchain.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: build wasm
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus
      # Generate the KULAS-free sample data up front (so global-setup skips it) and
      # surface the cargo build as its own timed step.
      - name: generate sample data
        run: |
          cargo run --release -q -p syllabus-cli -- gen-sample
          cargo run --release -q -p syllabus-cli -- convert dev-data/sample-raw.json \
            --compact --details-dir dev-data/sample-details \
            --details-out web/public/details -o web/public/data.json
      # CJK fonts must match the visual-baseline workflow exactly, or the visual
      # specs diff on every glyph. Keep this line identical in both workflows.
      - name: install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - uses: oven-sh/setup-bun@v2
      - name: install web deps
        working-directory: web
        run: bun install --frozen-lockfile
      - name: install Playwright browser
        working-directory: web
        run: bunx playwright install --with-deps chromium
      - name: run E2E (geometry / gestures / a11y / smoke)
        working-directory: web
        run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-results
          path: web/test-results/
          retention-days: 7
          if-no-files-found: ignore
