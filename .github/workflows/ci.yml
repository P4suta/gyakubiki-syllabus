name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Reads rust-toolchain.toml (channel + components + wasm32 target).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: fmt
        run: cargo fmt --check
      # FIELD_SPEC drives both the generated TS and docs; fail if they are stale.
      - name: field spec generated files up to date
        run: cargo run -q -p syllabus-cli -- gen-field-docs --check

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Native coverage only (the wasm crate's #[wasm_bindgen] surface isn't
      # exercised natively). Collect once, then report/enforce from the same data.
      - name: collect coverage
        run: cargo llvm-cov --workspace --exclude syllabus-wasm --no-report
      - name: report + enforce threshold
        run: |
          cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --fail-under-lines 80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  typos:
    name: typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@master

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !web/**

  web:
    name: Web (check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      # The frontend imports the generated WASM glue, so build it first.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: build wasm
        working-directory: ${{ github.workspace }}
        # --out-dir is relative to the crate root (crates/wasm), hence ../../.
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus
      - name: wasm boundary tests (node)
        working-directory: ${{ github.workspace }}
        # Exercise the JsValue shapes the frontend depends on (camelCase keys, …).
        run: wasm-pack test --node crates/wasm
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
