name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Reads rust-toolchain.toml (channel + components + wasm32 target).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: fmt
        run: cargo fmt --check

  typos:
    name: typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !web/**

  web:
    name: Web (check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      # The frontend imports the generated WASM glue, so build it first.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: build wasm
        working-directory: ${{ github.workspace }}
        # --out-dir は crate ルート (crates/wasm) 相対なので ../../ で repo 直下へ。
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
