name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build / test / lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  rust:
    name: Rust (test / clippy / fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Reads rust-toolchain.toml (channel + components + wasm32 target).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: fmt
        run: cargo fmt --check

  # Migration gate: the Rust `convert` must produce byte-identical data.json to
  # the Go pipeline it is replacing. Lives only while both exist; removed with the
  # Go job once `convert` is switched over.
  parity:
    name: convert parity (Go vs Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: build both CLIs
        run: |
          go build -o /tmp/go-cli ./cmd/syllabus-cli
          cargo build --release -p syllabus-cli
      - name: convert raw/*.json with both
        run: |
          /tmp/go-cli convert raw/*.json --v2 --compact -o /tmp/go.json
          ./target/release/syllabus-cli convert raw/*.json --v2 --compact -o /tmp/rs.json
      - name: byte-compare (generatedAt blanked — it is wall-clock)
        run: |
          sed -E 's/"generatedAt":"[^"]*"/"generatedAt":""/' /tmp/go.json > /tmp/go.norm
          sed -E 's/"generatedAt":"[^"]*"/"generatedAt":""/' /tmp/rs.json > /tmp/rs.norm
          cmp /tmp/go.norm /tmp/rs.norm

  typos:
    name: typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !web/**

  web:
    name: Web (check / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      # The frontend imports the generated WASM glue, so build it first.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - name: build wasm
        working-directory: ${{ github.workspace }}
        # --out-dir は crate ルート (crates/wasm) 相対なので ../../ で repo 直下へ。
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
