name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # Rust toolchain — shared by the convert CLI and the WASM build below.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # convert: raw JSON → data.json (Rust pipeline; Go fully retired).
      - run: cargo build --release -p syllabus-cli
      - run: ./target/release/syllabus-cli convert raw/*.json --compact -o web/public/data.json

      # Rust core → WASM (the frontend imports the generated glue)
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      # --out-dir は crate ルート (crates/wasm) 相対なので ../../ で repo 直下へ。
      - run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --out-name syllabus

      # Frontend: build
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
        working-directory: web
      - run: bun run check
        working-directory: web
      - run: bun run test
        working-directory: web
      - run: bun run build
        working-directory: web
        env:
          GITHUB_PAGES: 'true'

      # Deploy
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v4 + upload-artifact v7 (Node 24)
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v5
