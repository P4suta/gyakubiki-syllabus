name: Fetch parity (Go vs Rust)

# Manual only. Hits the real KULAS API, so it never runs on push/PR/schedule —
# it is the end-to-end gate the offline unit tests cannot give: it proves the
# Rust fetch completes the TLS chain and behaves identically to the Go fetch it
# will replace. NEVER run fetch locally; this is Actions-only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    name: fetch parity (real KULAS, Actions-only)
    runs-on: ubuntu-latest
    env:
      # Same token source as the monthly workflow (empty → HTML extraction).
      KULAS_API_TOKEN: ${{ secrets.KULAS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: build both CLIs
        run: |
          go build -o /tmp/go-cli ./cmd/syllabus-cli
          cargo build --release -p syllabus-cli
          cp ./target/release/syllabus-cli /tmp/rs-cli

      # Run both against the real API to separate dirs. Failures are tolerated so
      # the compare step can decide parity (e.g. both rejected by an upstream
      # token issue is still identical *behavior*).
      - name: fetch with both and compare
        run: |
          set +e
          echo "## Fetch parity (Go vs Rust)" >> "$GITHUB_STEP_SUMMARY"

          /tmp/go-cli fetch --out-dir /tmp/go > /tmp/go.log 2>&1; go_rc=$?
          /tmp/rs-cli fetch --out-dir /tmp/rs > /tmp/rs.log 2>&1; rs_rc=$?
          echo "Go rc=$go_rc, Rust rc=$rs_rc"
          echo "::group::Go log";  cat /tmp/go.log; echo "::endgroup::"
          echo "::group::Rust log"; cat /tmp/rs.log; echo "::endgroup::"

          # Both succeeded → the real gate: byte-identical raw/*.json.
          if [ "$go_rc" = 0 ] && [ "$rs_rc" = 0 ]; then
            if diff -rq /tmp/go /tmp/rs; then
              echo "- Go-vs-Rust: BYTE-IDENTICAL ✅ (cutover-ready)" | tee -a "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "- Go-vs-Rust: outputs DIFFER ❌" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # At least one failed. Parity still holds iff both reach the same point
          # and get the same KULAS response — the discriminator for TLS/session/
          # token/request equivalence. (A Rust TLS-chain failure would stop at the
          # session GET, a different signature than Go's findPage error.)
          go_http=$(grep -oE 'findPage が HTTP [0-9]+' /tmp/go.log | head -1)
          rs_http=$(grep -oE 'findPage が HTTP [0-9]+' /tmp/rs.log | head -1)
          echo "Go findPage='$go_http' / Rust findPage='$rs_http'"

          if [ -n "$go_http" ] && [ "$go_http" = "$rs_http" ]; then
            echo "- TLS/session/token/request: Go と Rust が **同一挙動** ($go_http) ✅" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "  Rust も session を確立し findPage まで到達 → TLS chain 補完は Rust でも成功。" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "- ⚠️ 実データ取得は KULAS が token を拒否しておりブロック中 (Go/Rust 共通の upstream 都合、移行とは無関係)。" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "  → token 問題が解消すれば本ゲートが byte 一致で cutover-ready を判定する。" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "- Go と Rust の挙動が乖離 (go_rc=$go_rc rs_rc=$rs_rc, go='$go_http' rs='$rs_http') ❌" | tee -a "$GITHUB_STEP_SUMMARY"
          exit 1
