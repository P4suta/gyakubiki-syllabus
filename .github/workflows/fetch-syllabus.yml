name: Fetch syllabus grid

# The grid fetch (findPage) is light (~8 pages, no per-request sleep, ~15 min), so
# running it often costs the server almost nothing. Freshness matters most right
# before a term starts (syllabi are published/updated in Mar-Apr and Sep-Oct), so
# the schedule is seasonal: daily in the busy months, weekly otherwise. This keeps
# lastUpdate current, which the daily fetch-details crawl then picks up.

on:
  schedule:
    # 19:00 UTC = 04:00 JST (1h before the detail crawl at JST 05:00).
    - cron: '0 19 * 3,4,9,10 *'            # busy months (Mar/Apr/Sep/Oct): daily
    - cron: '0 19 * 1,2,5,6,7,8,11,12 0'   # quiet months: Sundays only (weekly)
  workflow_dispatch:
    inputs:
      dry-run:
        description: Fetch and report counts only, without committing
        type: boolean
        default: false
      year:
        description: Set kaikoNendo explicitly (empty = auto-compute current year)
        type: string
        default: ''

permissions:
  contents: write   # commit raw/ to the data branch
  actions: write    # trigger deploy.yml via gh workflow run

concurrency:
  group: fetch-syllabus
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build syllabus-cli
        run: cargo build --release -p syllabus-cli

      - name: Fetch syllabus
        env:
          # Empty (the norm) extracts entryContext from the HTML; set only to override for testing.
          KULAS_API_TOKEN: ${{ secrets.KULAS_API_TOKEN }}
        run: |
          args=(fetch --out-dir raw/)
          if [[ -n "${{ inputs.year }}" ]]; then
            args+=(--year "${{ inputs.year }}")
          fi
          if [[ "${{ inputs.dry-run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          ./target/release/syllabus-cli "${args[@]}"

      - name: Commit if changed
        id: commit
        # Run only when dry-run is false. Signed commit straight to main
        # (createCommitOnBranch; main no longer requires status checks).
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/commit-signed.sh raw \
            "chore(raw): syllabus grid refresh ($(date -u +%Y-%m-%d))"

      - name: Trigger deploy workflow
        if: ${{ steps.commit.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
