# lefthook Git hooks manager. Enable with `just install-hooks`.
# https://github.com/evilmartians/lefthook
#
# Hooks mirror CI so failures surface before the PR. Rust checks run inside the
# Dev Container (`docker compose run --rm`) to keep target/ off the host; the lint
# tools (typos/actionlint/markdownlint) run on the host via mise.

pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "*.rs"
      run: docker compose run --rm -T dev cargo fmt --check
      fail_text: "rustfmt violations; fix with `just fmt`"
    typos:
      run: typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}

pre-push:
  parallel: false  # cargo test / clippy are heavy; run them sequentially
  commands:
    rust-test:
      run: docker compose run --rm -T dev cargo test
    rust-clippy:
      run: docker compose run --rm -T dev cargo clippy --all-targets -- -D warnings
    typos-full:
      run: typos
    markdown-full:
      run: markdownlint-cli2 "**/*.md" "#node_modules" "#web/**"
