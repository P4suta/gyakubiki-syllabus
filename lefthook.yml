# lefthook: Git hooks manager
# https://github.com/evilmartians/lefthook
#
# `just install-hooks` (= lefthook install) で有効化。
# pre-commit / pre-push は CI と同じ範囲を走らせる方針 (PR でしか落ちない事故を防ぐ)。
#
# Rust 系チェックだけは Dev Container 内で実行する: host の cargo で走らせると
# target/ がホストに再生成されてしまうため (ホスト無汚染の原則)。
# `docker compose run --rm` なのでコンテナの起動状態に依存しない (volume は共有され
# キャッシュは効く)。host の lint ツール (typos/actionlint/markdownlint) は mise 管理のまま。

pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "*.rs"
      run: docker compose run --rm -T dev cargo fmt --check
      fail_text: "rustfmt 違反あり。`just fmt` (コンテナ内) で修正してください"
    typos:
      run: typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}

pre-push:
  parallel: false  # cargo test / clippy は重いので順次
  commands:
    rust-test:
      run: docker compose run --rm -T dev cargo test
    rust-clippy:
      run: docker compose run --rm -T dev cargo clippy --all-targets -- -D warnings
    typos-full:
      run: typos
    markdown-full:
      run: markdownlint-cli2 "**/*.md" "#node_modules" "#web/**"
