# lefthook Git hooks manager. Enable with `just install-hooks`.
# https://github.com/evilmartians/lefthook
#
# Hooks mirror CI so failures surface locally, not in Actions. Rust/WASM/web
# checks run inside the Dev Container (`docker compose run --rm`) to keep target/
# and node_modules off the host; the lint tools (typos/actionlint/markdownlint)
# run on the host via mise.

pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "*.rs"
      run: docker compose run --rm -T dev cargo fmt --check
      fail_text: "rustfmt violations; fix with `just fmt`"
    typos:
      run: typos
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}

pre-push:
  parallel: false # cargo / wasm / web are heavy; run them sequentially
  commands:
    # Every Rust CI gate in one container: fmt, clippy, tests + the 80% coverage
    # threshold (via cargo-llvm-cov, exactly as CI), and the FIELD_SPEC sync check
    # (generated TS + docs/syllabus-fields.md must not be stale).
    rust:
      run: >-
        docker compose run --rm -T dev bash -c "cargo fmt --check
        && cargo clippy --locked --all-targets -- -D warnings
        && cargo llvm-cov --locked --workspace --exclude syllabus-wasm --fail-under-lines 80
        && cargo run --locked -q -p syllabus-cli -- gen-field-docs --check"
      fail_text: "Rust checks failed (fmt/clippy/test/coverage/gen-field-docs); see `just check`"
    # Mirrors the CI "Web (check / test)" job: build the wasm glue first, then
    # svelte-check/tsc and vitest.
    web:
      run: >-
        docker compose run --rm -T dev bash -c "wasm-pack build crates/wasm
        --target web --out-dir ../../web/src/wasm --out-name syllabus
        && cd web && bun install --frozen-lockfile && bun run check && bun run test"
      fail_text: "Web checks failed (svelte-check/tsc/vitest)"
    typos-full:
      run: typos
    markdown-full:
      run: markdownlint-cli2 "**/*.md" "#node_modules" "#web/**"
