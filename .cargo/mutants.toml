# cargo-mutants scope — declares which source is worth mutating, so the run no
# longer depends on a `--package` flag or prose in docs/testing.md.
#
# Mutation testing measures whether the suite *kills* injected bugs, so it only
# pays off on code the tests actually assert against. We mutate the pure logic —
# all of syllabus-core plus the tested parsers/converters in syllabus-cli — and
# exclude the surfaces other layers cover instead: the wasm boundary (wasm-pack
# node tests), and the CLI's network / scrape / IO / terminal plumbing (E2E and
# integration tests, not unit assertions). Mutants there survive by design and
# would only add noise.
exclude_globs = [
    "crates/wasm/**",
    "crates/cli/src/main.rs",
    "crates/cli/src/net.rs",
    "crates/cli/src/io.rs",
    "crates/cli/src/commit.rs",
    "crates/cli/src/banner.rs",
    "crates/cli/src/term.rs",
    "crates/cli/src/fetch/**",
    "crates/cli/src/fetch_details/**",
    # palette.rs is the OKLCH colour derivation, pinned byte-for-byte by the
    # `gen-palette --check` golden — mutating its arithmetic reflects the
    # derivation, not a test gap (same call as the web sdgs/icons data tables).
    "crates/cli/src/palette.rs",
    # gen_sample.rs is the deterministic dummy-data generator (test tooling for
    # E2E), not product logic.
    "crates/cli/src/gen_sample.rs",
]

# Proven-equivalent mutants: no input distinguishes them from the original, so no
# test can kill them. Excluded (with the reasoning) rather than left as noise.
exclude_re = [
    # eval_type's exact-match arms are a fast-path + vocabulary doc; the keyword
    # scan below re-derives the identical label for each of the eight labels, so
    # deleting an arm changes nothing observable.
    "delete match arm .* in eval_type",
    # open_paren_debt's `depth > 0` guard only stops the count going negative, but
    # its sole caller (repair_keywords) flushes on `debt <= 0`, which treats 0 and
    # negative alike — the guard boundary is never observable.
    "match guard depth > 0 with true in open_paren_debt",
    "replace > with >= in open_paren_debt",
    # BitSet::empty is literally `Self::default()`, so the `Default::default()`
    # replacement is the same value.
    "replace BitSet::empty -> Self with Default::default",
    # search's `count > 0` only guards adding `weight * 0 = 0`; `>= 0` adds a zero
    # score and the spans were already collected, so the result is identical.
    "replace > with >= in SearchIndex::search",
    # split_semester's `colon + 1` skips the delimiter; `* 1` keeps a leading ':'
    # in `rest`, but its only consumer (parse_jikanwari) scans the whole string
    # with find_day/find_period, which are unaffected by the leading char.
    'replace \+ with \* in split_semester',
]
