version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: all
  disable:
    # 自由を奪うすぎ系
    - wsl              # whitespace 強制が過剰
    - wsl_v5           # wsl の新版
    - nlreturn         # ditto
    - lll              # 長い行が読みやすいケースあり
    - varnamelen       # 命名長が厳しすぎ
    - funlen           # 既存 main.go が長め
    - cyclop           # gocyclo で十分
    - gocyclo          # gocognit で十分
    # 本プロジェクトに合わない
    - depguard         # import 制限は不要
    - gochecknoglobals # 正当な package var あり (regex 等)
    - gochecknoinits   # init() は cobra で使う想定
    - exhaustruct      # struct 全フィールド指定強制は過剰
    - tagliatelle      # KULAS の JSON tag は Go 流ではない
    - mnd              # マジックナンバー検出は noisy
    - paralleltest     # 全テストの parallel 化は不要
    - testpackage      # 同一 package test を許す
    - ireturn          # interface return 許容
    - nonamedreturns   # named return 許容
    # 日本語プロジェクト特有
    - gosmopolitan     # 日本語文字列・コメント禁止系。本プロジェクトでは日本語が一級市民
    # error 系の過度な厳格化
    - err113           # fmt.Errorf 動的エラー禁止は実用ノイズが大きい
    - noinlineerr      # inline error 禁止も同様
    - wrapcheck        # 全エラー wrap 必須は CLI レベルではノイズ
    - forbidigo        # fmt.Print* 禁止 — CLI/dry-run report で使う
    - goconst          # 短い JSON 構造文字列が多すぎて false positive
    - intrange         # Go 1.22 range over int への強制移行 — 既存 for ループを温存
    - perfsprint       # micro-optimization、可読性とトレードオフ
    - gocheckcompilerdirectives  # //go:fix directive を誤検知 (go 1.24+)
  settings:
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 4
      min-occurrences: 3
    gosec:
      excludes:
        - G104   # errors unhandled — errcheck で見るので重複
    nestif:
      min-complexity: 5
    revive:
      rules:
        - name: exported
          disabled: false
    staticcheck:
      checks: ["all"]
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocognit
          - nestif
          - dupl
      - path: cmd/syllabus-cli/main\.go
        linters:
          - gocognit
          - nestif

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
