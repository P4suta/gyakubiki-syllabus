# markdownlint-cli2 config.
# https://github.com/DavidAnson/markdownlint

default: true

MD013: false  # no line-length limit (weak signal with mixed-width text)
MD033: false  # allow inline HTML
MD041: false  # first line need not be an H1
MD060: false  # both compact and aligned table styles are fine
MD024:
  siblings_only: true  # forbid duplicate headings only within a section
