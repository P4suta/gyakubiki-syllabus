# mise: 開発ツールのバージョン管理
# https://mise.jdx.dev/
#
# `mise install` で一括 install。`just install-tools` の代替。

[tools]
bun = "latest"
just = "latest"
lefthook = "latest"
typos = "latest"
actionlint = "latest"
# WASM ビルダ。Rust 本体は rust-toolchain.toml が唯一の真実の源 (channel + wasm32 target)。
wasm-pack = "0.13.1"

# npm backend (bun ではなく npm 経由のほうが mise の cache が効く)
"npm:markdownlint-cli2" = "latest"
