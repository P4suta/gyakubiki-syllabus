# Dev tool versions. `mise install` sets them all up.
# https://mise.jdx.dev/

[tools]
bun = "latest"
just = "latest"
lefthook = "latest"
typos = "latest"
actionlint = "latest"
# WASM builder; the Rust toolchain itself is pinned by rust-toolchain.toml.
wasm-pack = "0.13.1"

# npm backend caches better under mise than the bun backend.
"npm:markdownlint-cli2" = "latest"
node = "latest"
